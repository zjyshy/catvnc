# /etc/nginx/conf.d/catvnc.conf
#
# New shape for M1: nginx just does TCP + WebSocket reverse proxy to the
# Python backend. No sub_filter, no body rewriting — all ICE/SDP rewriting
# happens inside the backend WS proxy.
#
# Rollback: keep the old sub_filter version as catvnc.conf.bak. To revert:
#   sudo cp /etc/nginx/conf.d/catvnc.conf.bak /etc/nginx/conf.d/catvnc.conf
#   sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream catvnc_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 18888;
    server_name _;

    # Keep WS alive for signaling + control (no data cap)
    proxy_read_timeout  86400;
    proxy_send_timeout  86400;

    proxy_http_version 1.1;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Streaming — never buffer bodies for signaling / video paths
    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_cache             off;

    location / {
        proxy_pass http://catvnc_backend;
    }
}
